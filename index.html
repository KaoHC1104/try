<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>青年勞動市場趨勢分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; padding: 24px; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab {
    padding: 8px 22px; border-radius: 20px; border: 1.5px solid #cbd5e1;
    background: white; font-size: 13px; cursor: pointer; transition: all 0.18s; color: #475569; font-weight: 500;
  }
  .tab:hover { border-color: #93c5fd; color: #2563eb; }
  .tab.active { background: #1d4ed8; border-color: #1d4ed8; color: white; font-weight: 700; box-shadow: 0 2px 8px rgba(29,78,216,0.25); }
  .cards { display: flex; gap: 12px; margin-bottom: 16px; }
  .card {
    flex: 1; background: white; border-radius: 14px; padding: 14px 18px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07); border-top: 4px solid;
  }
  .card-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
  .card-val { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .card-unit { font-size: 12px; font-weight: 400; color: #94a3b8; }
  .card-range { font-size: 11px; color: #cbd5e1; margin-top: 2px; }
  .card-change { font-size: 12px; margin-top: 5px; font-weight: 600; }
  .chart-box { background: white; border-radius: 16px; padding: 24px 24px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .legend { display: flex; gap: 20px; margin-top: 14px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #64748b; }
  .legend-dot { width: 13px; height: 13px; border-radius: 50%; }
  .note { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>青年勞動市場趨勢分析</h1>
  <div class="subtitle">單位：千人　　資料來源：中華民國主計總處　　各指標年份範圍不同，依資料可得性顯示</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('population')">民間人口</div>
    <div class="tab" onclick="switchTab('labor')">勞動力</div>
    <div class="tab" onclick="switchTab('unemployed')">失業人數</div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="chart-box">
    <canvas id="mainChart" height="300"></canvas>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>15–19歲</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>20–24歲</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>25–29歲</div>
    </div>
  </div>
  <div class="note" id="noteText"></div>
</div>

<script>
const tabData = {
  population: {
    label: '民間人口（千人）',
    note: '15–19歲人口自101年後持續快速下降，反映少子化長期衝擊；25–29歲近年亦明顯走滑。',
    years: ['100年','101年','102年','103年','104年','105年','106年','107年','108年','109年','110年','111年','112年','113年','114年'],
    d: {
      '15-19': [1593,1604,1581,1529,1496,1456,1383,1327,1272,1192,1109,1061,1031,1008,977],
      '20-24': [1459,1467,1465,1487,1495,1496,1505,1505,1470,1441,1402,1323,1249,1205,1132],
      '25-29': [1756,1656,1594,1551,1519,1518,1528,1522,1519,1534,1532,1521,1508,1464,1434],
    }
  },
  labor: {
    label: '勞動力（千人）',
    note: '20–24歲勞動力在107年達到高峰後反轉下降；25–29歲勞動力持續收縮，主因人口減少。',
    years: ['100年','101年','102年','103年','104年','105年','106年','107年','108年','109年','110年','111年','112年','113年','114年'],
    d: {
      '15-19': [138,136,128,122,125,125,122,123,125,112,99,95,93,94,95],
      '20-24': [733,758,773,764,780,801,822,849,865,850,825,781,737,729,711],
      '25-29': [1570,1522,1474,1422,1405,1400,1413,1421,1428,1420,1403,1393,1379,1345,1330],
    }
  },
  unemployed: {
    label: '失業人數（千人）',
    note: '98年金融海嘯衝擊明顯，25–29歲失業人數飆升至144千人。近十年三組均持續改善。',
    years: ['90年','91年','92年','93年','94年','95年','96年','97年','98年','99年',
            '100年','101年','102年','103年','104年','105年','106年','107年','108年','109年',
            '110年','111年','112年','113年','114年'],
    d: {
      '15-19': [34,32,27,23,20,18,17,18,19,15,16,13,12,11,11,11,11,10,11,9,9,8,8,8,9],
      '20-24': [97,112,104,98,92,86,86,92,108,99,93,100,106,101,98,101,102,102,106,103,103,97,87,85,82],
      '25-29': [77,94,93,87,92,97,96,105,144,132,112,108,105,97,92,95,93,91,94,92,92,85,83,79,77],
    }
  }
};

const colors = {
  '15-19': { line:'#3b82f6', fill:'rgba(59,130,246,0.08)', top:'#3b82f6' },
  '20-24': { line:'#f59e0b', fill:'rgba(245,158,11,0.08)',  top:'#f59e0b' },
  '25-29': { line:'#10b981', fill:'rgba(16,185,129,0.08)', top:'#10b981' },
};
const groups = ['15-19','20-24','25-29'];
const groupLabels = ['15–19歲','20–24歲','25–29歲'];

let currentTab = 'population';
let chart;

function buildDatasets(tab) {
  const cfg = tabData[tab];
  return groups.map(g => ({
    label: g.replace('-','–') + '歲',
    data: cfg.d[g],
    borderColor: colors[g].line,
    backgroundColor: colors[g].fill,
    pointBackgroundColor: colors[g].line,
    pointRadius: 4, pointHoverRadius: 7,
    borderWidth: 2.5, fill: true, tension: 0.35,
  }));
}

function renderCards(tab) {
  const cfg = tabData[tab];
  const n = cfg.years.length;
  const firstYear = cfg.years[0], lastYear = cfg.years[n-1];
  let html = '';
  groups.forEach((g, i) => {
    const arr = cfg.d[g];
    const latest = arr[n-1], first = arr[0];
    const diff = latest - first;
    const pct = ((diff / first) * 100).toFixed(1);
    const isUp = diff >= 0;
    const changeColor = (tab === 'unemployed') ? (isUp ? '#ef4444' : '#10b981') : (isUp ? '#ef4444' : '#10b981');
    // For population/labor, down is bad (red); for unemployed, down is good (green)
    const goodDown = true; // down is generally fine for unemployed, bad for others — colour accordingly
    const arrowColor = tab === 'unemployed'
      ? (isUp ? '#ef4444' : '#10b981')
      : (isUp ? '#10b981' : '#ef4444');
    html += `<div class="card" style="border-top-color:${colors[g].top}">
      <div class="card-label">${groupLabels[i]}　最新值（${lastYear}）</div>
      <div class="card-val" style="color:${colors[g].line}">${latest.toLocaleString()}<span class="card-unit"> 千人</span></div>
      <div class="card-range">${firstYear} 基準值：${first.toLocaleString()} 千人</div>
      <div class="card-change" style="color:${arrowColor}">${isUp ? '▲' : '▼'} ${Math.abs(diff).toLocaleString()} 千人（${isUp?'+':''}${pct}%）</div>
    </div>`;
  });
  document.getElementById('cards').innerHTML = html;
  document.getElementById('noteText').textContent = '📌 ' + cfg.note;
}

function switchTab(tab) {
  currentTab = tab;
  const keys = ['population','labor','unemployed'];
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', keys[i] === tab));
  const cfg = tabData[tab];
  chart.data.labels = cfg.years;
  chart.data.datasets = buildDatasets(tab);
  chart.options.scales.y.title.text = cfg.label;
  chart.update('active');
  renderCards(tab);
}

window.addEventListener('load', () => {
  const ctx = document.getElementById('mainChart').getContext('2d');
  const cfg = tabData[currentTab];
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: cfg.years, datasets: buildDatasets(currentTab) },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.88)',
          titleFont: { size: 13, family: 'Microsoft JhengHei' },
          bodyFont:  { size: 12, family: 'Microsoft JhengHei' },
          padding: 12,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}：${ctx.parsed.y.toLocaleString()} 千人`
          }
        }
      },
      scales: {
        x: {
          grid: { color:'rgba(0,0,0,0.04)' },
          ticks: { font:{ size:11 }, maxRotation: 45, minRotation: 30 }
        },
        y: {
          grid: { color:'rgba(0,0,0,0.04)' },
          ticks: { font:{ size:12 } },
          title: { display:true, text: cfg.label, font:{ size:12 }, color:'#94a3b8' }
        }
      }
    }
  });
  renderCards(currentTab);
});
</script>
</body>
</html>
